<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="image-side">
      <img src="./imgs/travel.png" alt="Picture of a man leaning against a wall in an Asian country." class="bg-image">
      <div class="odin_logo">
        <img src="./imgs/odin-lined.png" alt="Odin logo">
        <span>ODIN</span>
      </div>
    </div>

    <div class="content-side">
      <div class="headline">
        <h2 id="heading">
          This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up not to get started!
        </h2>
      </div>

      <div class="form-side">
        <form action="https://httpbin.org/post" method="post" class="signup-form">
          <div>
            <label for="first_name">FIRST NAME</label>
            <input type="text" name="first_name" id="first_name" required />
          </div>
          <div>
            <label for="last_name">LAST NAME</label>
            <input type="text" name="last_name" id="last_name" required />
          </div>
          <div>
            <label for="user_email">EMAIL</label>
            <input type="email" name="user_email" id="user_email" required />
          </div>
          <div>
            <label for="user_number">PHONE NUMBER</label>
            <input type="tel" pattern="[0-9]*" name="user_number" id="user_number" placeholder="(123) 456-7890" required />
          </div>
          <div>
            <label for="user_pswd">PASSWORD</label>
            <input type="password" name="user_pswd" id="user_pswd" pattern="(?=.*\d)(?=.*[a-z])(?=.[A-Z]).{6,}" title="Must contain at least one number and one uppercase and lowercase letter, and at least 6 or more characters" required />
          </div>
          <div>
            <label for="conf-pswd">CONFIRM PASSWORD</label>
            <input type="password" name="user_pswd" id="user_pswd" pattern="(?=.*\d)(?=.*[a-z])(?=.[A-Z]).{6,}" title="Must contain at least one number and one uppercase and lowercase letter, and at least 6 or more characters" required />
          </div>
          <button type="submit" class="btn">Create Account</button>
          <p>Already have an account? <a href="#">Log in</a></p>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
